<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Avatar Generator</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      body { overflow: hidden; background: #1a1a2e; font-family: system-ui, sans-serif; }
      canvas { display: block; transition: width 0.3s ease, height 0.3s ease; }

      /* ── Toggle button ── */
      #panel-toggle {
        position: fixed; top: 16px; right: 16px; z-index: 200;
        width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer;
        background: rgba(255,255,255,0.12); color: #fff; font-size: 20px;
        backdrop-filter: blur(8px);
        transition: background 0.2s, right 0.3s ease;
      }
      #panel-toggle:hover { background: rgba(255,255,255,0.22); }

      /* ── Side panel ── */
      #controls-panel {
        display: none; /* shown by JS after models load */
        position: fixed; top: 0; right: 0; height: 100vh; width: 280px;
        flex-direction: column; overflow: hidden;
        background: rgba(10, 10, 22, 0.88);
        border-left: 1px solid rgba(255,255,255,0.08);
        backdrop-filter: blur(14px);
        transition: transform 0.3s ease;
      }
      #controls-panel.collapsed { transform: translateX(280px); }

      .panel-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.08);
        color: #fff; font-size: 15px; font-weight: 600; flex-shrink: 0;
      }

      .panel-body { overflow-y: auto; flex: 1; padding: 12px; }
      .panel-body::-webkit-scrollbar { width: 4px; }
      .panel-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

      .section-title {
        color: rgba(255,255,255,0.45); font-size: 11px; font-weight: 600;
        letter-spacing: 0.08em; text-transform: uppercase; margin: 12px 0 8px;
      }

      /* ── Emotion buttons ── */
      #emotion-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

      .emotion-btn {
        display: flex; flex-direction: column; align-items: center; gap: 3px;
        padding: 8px 4px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.05); color: #ccc; cursor: pointer;
        font-size: 12px; transition: all 0.15s;
      }
      .emotion-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
      .emotion-btn.active {
        background: rgba(99,102,241,0.35); border-color: rgba(99,102,241,0.7); color: #fff;
      }
      .em-emoji { font-size: 22px; line-height: 1; }
      .em-label { font-size: 11px; }

      /* ── Morph sliders ── */
      .slider-row { margin-bottom: 10px; }
      .slider-label { color: rgba(255,255,255,0.65); font-size: 12px; margin-bottom: 3px; }

      input[type="range"] {
        width: 100%; height: 4px; accent-color: #6366f1;
        cursor: pointer; appearance: none; background: rgba(255,255,255,0.12);
        border-radius: 2px; outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        appearance: none; width: 14px; height: 14px; border-radius: 50%;
        background: #6366f1; cursor: pointer;
      }

      /* ── Environment buttons (background & lighting) ── */
      #bg-buttons, #lighting-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

      .env-btn {
        padding: 7px 6px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.05); color: #ccc; cursor: pointer;
        font-size: 12px; text-align: center; transition: all 0.15s; white-space: nowrap;
        overflow: hidden; text-overflow: ellipsis;
      }
      .env-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
      .env-btn.active {
        background: rgba(99,102,241,0.35); border-color: rgba(99,102,241,0.7); color: #fff;
      }

      /* ── Download button ── */
      #download-btn {
        display: flex; align-items: center; justify-content: center; gap: 6px;
        width: 100%; margin-top: 20px; padding: 10px;
        border-radius: 10px; border: 1px solid rgba(255,255,255,0.15);
        background: rgba(99,102,241,0.2); color: #fff;
        font-size: 13px; font-weight: 500; cursor: pointer;
        transition: background 0.2s, opacity 0.2s;
      }
      #download-btn:hover { background: rgba(99,102,241,0.4); }
      #download-btn:disabled { opacity: 0.5; cursor: not-allowed; }

      /* ── Mobile: bottom sheet ── */
      @media (max-width: 600px) {
        #controls-panel {
          top: auto; bottom: 0; left: 0; right: 0;
          width: 100%; height: 44vh; /* leaves 56vh for the avatar */
          border-left: none;
          border-top: 1px solid rgba(255,255,255,0.08);
          border-radius: 16px 16px 0 0;
        }
        #controls-panel.collapsed { transform: translateY(100%); }
        /* Toggle button: top-left on mobile so it never overlaps the panel */
        #panel-toggle { top: 12px; right: auto; left: 12px; }
      }
    </style>
  </head>
  <body>
    <canvas class="webgl"></canvas>

    <button id="panel-toggle" title="Toggle panel">🎭</button>

    <div id="controls-panel">
      <div class="panel-header">
        <span>😊 Expressions</span>
        <span style="color:rgba(255,255,255,0.4); font-size:12px; font-weight:400">63 morphs</span>
      </div>
      <div class="panel-body">
        <div class="section-title">Emotions</div>
        <div id="emotion-buttons"></div>
        <div class="section-title" style="margin-top:16px">Fine Controls</div>
        <div id="morph-sliders"></div>

        <div class="section-title" style="margin-top:16px">Background</div>
        <div id="bg-buttons"></div>

        <div class="section-title" style="margin-top:16px">Lighting</div>
        <div id="lighting-buttons"></div>

        <button id="download-btn">⬇️ Download GLB</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
